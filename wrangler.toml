name = "sales-boi"
main = "worker/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[kv_namespaces]]
binding = "QUEUE"
id = "REPLACE_WITH_KV_ID_FROM_WRANGLER"

[triggers]
crons = ["0 13 * * *"]

[vars]
DISCOVER_CITIES = "Austin,Los Angeles,Brooklyn,Miami,Denver,Chicago,Portland,Seattle,Nashville,Remote"
DISCOVER_NICHES = "performance marketing,social media,paid social,video production,creative,brand,DTC,ecommerce"
SCORE_MODEL = "claude-haiku-4-5-20251001"
